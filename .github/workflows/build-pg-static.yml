name: "Build static postgres deps - libedit variant"

on:
  workflow_dispatch:
    inputs:
      force_rebuild_deps:
        description: "Force rebuilding the static deps even if a deps release already exists"
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-pg-static.yml'

permissions:
  contents: write

env:
  ANDROID_API: 24
  NDK_VERSION: r27c
  DEPS_RELEASE_TAG: deps-baseline-v2
  PG_VERSION: "18.2"

jobs:
  build-all:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Step 1: Decide whether we need to rebuild the static deps.
      # ------------------------------------------------------------------
      - name: Check whether deps release already has the staging asset
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          FORCE="${{ inputs.force_rebuild_deps || 'false' }}"
          if [ "$FORCE" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "$DEPS_RELEASE_TAG" --repo "${{ github.repository }}" \
               --json assets --jq '.assets[].name' 2>/dev/null | grep -q "staging-stage1.tar.gz"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ------------------------------------------------------------------
      # Step 2: NDK setup (shared by deps build and postgres build).
      # ------------------------------------------------------------------
      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /opt/android-ndk
          key: android-ndk-${{ env.NDK_VERSION }}-linux

      - name: Download and unpack NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          curl -fsSL -o /tmp/ndk.zip \
            "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          mkdir -p /opt/android-ndk
          unzip -q /tmp/ndk.zip -d /tmp/ndk-extract
          mv /tmp/ndk-extract/android-ndk-${NDK_VERSION}/* /opt/android-ndk/
          rm -rf /tmp/ndk.zip /tmp/ndk-extract

      - name: Set toolchain environment
        shell: bash
        run: |
          set -euxo pipefail
          TOOLCHAIN="/opt/android-ndk/toolchains/llvm/prebuilt/linux-x86_64"
          echo "NDK_TOOLCHAIN=$TOOLCHAIN" >> "$GITHUB_ENV"
          echo "CC=$TOOLCHAIN/bin/aarch64-linux-android${ANDROID_API}-clang" >> "$GITHUB_ENV"
          echo "CXX=$TOOLCHAIN/bin/aarch64-linux-android${ANDROID_API}-clang++" >> "$GITHUB_ENV"
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> "$GITHUB_ENV"
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> "$GITHUB_ENV"
          echo "$TOOLCHAIN/bin" >> "$GITHUB_PATH"

      - name: Probe toolchain
        shell: bash
        run: |
          set -x
          ls -la "$NDK_TOOLCHAIN/bin" | grep -i aarch64
          echo "CC=$CC"
          "$CC" --version
          find "$NDK_TOOLCHAIN" -maxdepth 3 -iname "sysroot" -type d

      - name: Ensure cmake is available
        shell: bash
        run: |
          set -euxo pipefail
          if ! cmake --version >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y cmake
          fi
          cmake --version

      - name: Smoke test cross-compile
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/smoke
          printf '%s\n' \
            '#include <stdio.h>' \
            'int main(void) { printf("hello from android build\n"); return 0; }' \
            > /tmp/smoke/hello.c
          "$CC" /tmp/smoke/hello.c -o /tmp/smoke/hello
          file /tmp/smoke/hello

      # ------------------------------------------------------------------
      # Step 3a: If deps already exist in Release, download them with retries.
      # ------------------------------------------------------------------
      - name: Download staging deps from Release (with retries + integrity check)
        if: steps.check.outputs.exists == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/staging
          for attempt in 1 2 3 4 5 6 7 8; do
            echo "::group::Release download attempt $attempt"
            rm -f /tmp/staging-stage1.tar.gz
            if gh release download "$DEPS_RELEASE_TAG" \
                 --repo "${{ github.repository }}" \
                 --pattern "staging-stage1.tar.gz" \
                 --dir /tmp --clobber 2>/dev/null; then
              if [ -f /tmp/staging-stage1.tar.gz ] \
                 && gzip -t /tmp/staging-stage1.tar.gz 2>/dev/null; then
                echo "Tarball passed gzip integrity check."
                tar xzf /tmp/staging-stage1.tar.gz -C /tmp/staging
                echo "::endgroup::"
                exit 0
              else
                echo "Downloaded asset failed gzip integrity check, retrying..."
              fi
            else
              echo "gh release download failed on attempt $attempt"
            fi
            echo "::endgroup::"
            sleep $((attempt * 5))
          done
          echo "::error::Failed to download staging-stage1.tar.gz after 8 attempts"
          exit 1

      # ------------------------------------------------------------------
      # Step 3b: Build all static deps from source.
      #          NOTE: readline + termcap stub REMOVED. libedit is now used
      #          instead — it has built-in terminal handling, zero external
      #          termcap dependency, and PostgreSQL supports it natively
      #          via --with-libedit.
      # ------------------------------------------------------------------
      - name: Build static zlib
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -A "Mozilla/5.0 (X11; Linux x86_64) curl-fallback" \
            -o zlib.tar.gz \
            "https://github.com/madler/zlib/releases/download/v1.3.2/zlib-1.3.2.tar.gz"
          tar xf zlib.tar.gz
          cd zlib-1.3.2
          CC="$CC" AR="$AR" RANLIB="$RANLIB" \
            ./configure --prefix=/tmp/staging --static
          make -j"$(nproc)"
          make install
          ls -la /tmp/staging/lib/libz.a

      - name: Build static libuuid (e2fsprogs)
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o e2fsprogs.tar.gz \
            "https://sourceforge.net/projects/e2fsprogs/files/e2fsprogs/v1.47.4/e2fsprogs-1.47.4.tar.gz/download"
          tar xf e2fsprogs.tar.gz
          cd e2fsprogs-1.47.4
          CC="$CC" AR="$AR" RANLIB="$RANLIB" \
            ./configure \
              --host=aarch64-linux-android \
              --prefix=/tmp/staging \
              --enable-libuuid \
              --disable-shared \
              --enable-static \
              --disable-defrag \
              --disable-e2initrd-helper \
              --disable-fsck \
              --disable-uuidd
          make -C lib/uuid -j"$(nproc)"
          make -C lib/uuid install
          ls -la /tmp/staging/lib/libuuid.a

      # ------------------------------------------------------------------
      # Build a minimal termcap stub library AND matching header.
      # libedit-20240808-3.1 has a HARD requirement on:
      #   1. tgetent from libtinfo / libncurses / libcurses / libtermcap
      #      (AC_SEARCH_LIBS)
      #   2. ncurses.h / curses.h / termcap.h header (AC_CHECK_HEADERS)
      # Android NDK has neither. We provide both:
      #   - A tiny termcap.c with 6 no-op functions, installed as 4 .a
      #     archives under all 4 names libedit probes
      #   - A minimal termcap.h header installed under all 3 names libedit
      #     probes (termcap.h, ncurses.h, curses.h)
      #
      # This step is UNCONDITIONAL (no `if:` guard) because it's needed both
      # when deps are freshly built AND when they're downloaded from the
      # Release.
      # ------------------------------------------------------------------
      - name: Build minimal termcap stub (libs + headers)
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/termcap-stub /tmp/staging/include /tmp/staging/lib
          cat > /tmp/termcap-stub/termcap.c <<'STUB_EOF'
          /* Minimal termcap stub for Android cross-compile.
           * Provides dummy implementations of termcap functions that
           * libedit.a references at link time. At runtime psql's line
           * editing goes through the device's own terminal emulator
           * and these functions are never actually called.
           */
          int tgetent(char *buf, const char *name) { (void)buf; (void)name; return 1; }
          int tgetflag(const char *id) { (void)id; return 0; }
          int tgetnum(const char *id) { (void)id; return -1; }
          char *tgetstr(const char *id, char **area) { (void)id; (void)area; return (char *)0; }
          int tputs(const char *cp, int affcnt, int (*outc)(int)) {
            (void)cp; (void)affcnt; (void)outc; return 0;
          }
          char *tgoto(const char *cm, int col, int row) {
            (void)col; (void)row; return (char *)cm;
          }
          STUB_EOF

          # Minimal termcap.h — just enough to satisfy libedit's #include
          # and AC_CHECK_HEADERS. libedit only uses tgetent / tgetflag /
          # tgetnum / tgetstr / tputs / tgoto, so we only need to declare
          # those.
          cat > /tmp/termcap-stub/termcap.h <<'HDR_EOF'
          #ifndef _FAKE_TERMCAP_H
          #define _FAKE_TERMCAP_H
          #ifdef __cplusplus
          extern "C" {
          #endif
          int     tgetent(char *buf, const char *name);
          int     tgetflag(const char *id);
          int     tgetnum(const char *id);
          char   *tgetstr(const char *id, char **area);
          int     tputs(const char *cp, int affcnt, int (*outc)(int));
          char   *tgoto(const char *cm, int col, int row);
          #ifdef __cplusplus
          }
          #endif
          #endif /* _FAKE_TERMCAP_H */
          HDR_EOF

          # Install header under all 3 names libedit probes
          for hdr in termcap.h ncurses.h curses.h; do
            cp /tmp/termcap-stub/termcap.h /tmp/staging/include/$hdr
          done

          # Compile the stub and install as 4 .a archives under all 4
          # names libedit's AC_SEARCH_LIBS probes
          $CC -c /tmp/termcap-stub/termcap.c -o /tmp/termcap-stub/termcap.o
          for name in libncurses libcurses libtermcap libtinfo; do
            $AR rcs /tmp/staging/lib/${name}.a /tmp/termcap-stub/termcap.o
            $RANLIB /tmp/staging/lib/${name}.a
          done

          echo "===== installed headers ====="
          ls -la /tmp/staging/include/termcap.h \
                 /tmp/staging/include/ncurses.h \
                 /tmp/staging/include/curses.h
          echo "===== installed stub archives ====="
          ls -la /tmp/staging/lib/libncurses.a /tmp/staging/lib/libtermcap.a \
                 /tmp/staging/lib/libtinfo.a  /tmp/staging/lib/libcurses.a
          echo "===== libncurses.a (stub) symbols ====="
          "$NDK_TOOLCHAIN/bin/llvm-nm" /tmp/staging/lib/libncurses.a

      - name: Build static libedit
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o libedit.tar.gz \
            "https://thrysoee.dk/editline/libedit-20240808-3.1.tar.gz"
          tar xf libedit.tar.gz
          cd libedit-20240808-3.1

          # ----- Source patches for Android bionic incompatibilities -----
          #
          # libedit-20240808-3.1 has 2 hard incompatibilities with bionic:
          #
          # 1. src/readline.c lines ~1895-1910 use setpwent()/getpwent()/
          #    endpwent() from <pwd.h> to do user-name completion (~ prefix).
          #    Bionic does NOT implement these functions at all (Android
          #    has no concept of a system password database). The code is
          #    guarded by `#ifdef HAVE_GETPWENT`, but libedit's configure
          #    on a real Linux system detects them and defines the macro,
          #    then we cross-compile and the macros are cached → build fails.
          #    Fix: patch src/readline.c to force-disable the block.
          #
          # 2. src/vis.c uses `NBBY` (Number of Bits per BYte = 8), a BSD
          #    macro. glibc defines it in <sys/param.h>, bionic does not.
          #    Fix: pass -DNBBY=8 via CFLAGS.
          #
          # 3. src/chartype.h checks __STDC_ISO_10646__ (bionic doesn't
          #    define it even though wchar_t IS UTF-32). Fix: pass
          #    -D__STDC_ISO_10646__=201103L via CFLAGS.
          #
          # 4. AC_CHECK_HEADERS needs termcap.h/ncurses.h/curses.h, and
          #    AC_SEARCH_LIBS needs tgetent in libtermcap/libncurses/
          #    libcurses/libtinfo. Fix: tiny stub (built in previous step)
          #    provides both.

          # Patch 1: nuke the getpwent user-name completion block in readline.c
          # by macro-defining the 3 pwd.h functions as no-ops on Android.
          #
          # libedit's readline.c does NOT include "readline.h" (a .c file
          # doesn't include its own header), so we can't anchor on that.
          # Instead we anchor on `#include "config.h"` which is the first
          # include in every libedit source file (autoconf-generated).
          #
          # We also `#include <pwd.h>` in the macro block so that
          # `struct passwd *` is a known type when the macro expands.
          sed -i '/#include "config.h"/a \
          #if defined(__ANDROID__)\
          #include <pwd.h>\
          #define getpwent() ((struct passwd *)NULL)\
          #define setpwent() ((void)0)\
          #define endpwent() ((void)0)\
          #endif' \
            src/readline.c

          # Sanity check the patch landed (don't fail the build if grep
          # returns no matches — that's a real problem but we want to
          # see compile errors, not grep exit codes)
          echo "===== verifying __ANDROID__ patch landed in readline.c ====="
          grep -n "__ANDROID__\|getpwent.*NULL\|setpwent.*void" src/readline.c | head -10 || true
          echo "===== verifying setpwent/endpwent calls commented out ====="
          grep -n "setpwent\|endpwent" src/readline.c | head -10 || true

          CC="$CC" AR="$AR" RANLIB="$RANLIB" \
            CFLAGS="-I/tmp/staging/include -D__STDC_ISO_10646__=201103L -DNBBY=8" \
            CPPFLAGS="-I/tmp/staging/include -D__STDC_ISO_10646__=201103L -DNBBY=8" \
            LDFLAGS="-L/tmp/staging/lib" \
            ./configure \
              --host=aarch64-linux-android \
              --prefix=/tmp/staging \
              --disable-shared \
              --enable-static
          make -j"$(nproc)"
          make install
          ls -la /tmp/staging/lib/libedit.a
          ls -la /tmp/staging/include/editline/readline.h

      # ------------------------------------------------------------------
      # Diagnostic: list the .o files inside libedit.a to confirm
      # readline.o was actually included. If readline.o is missing,
      # postgres configure will fail with "libedit library not found"
      # and we'll know why. This replaces the old symbol-level verify
      # step which was generating false negatives due to nm grep pattern
      # issues.
      # ------------------------------------------------------------------
      - name: Inspect libedit.a contents
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -eu
          NM="$NDK_TOOLCHAIN/bin/llvm-nm"
          echo "===== .o files inside libedit.a ====="
          "$AR" t /tmp/staging/lib/libedit.a || true
          echo ""
          echo "===== checking for readline.o ====="
          if "$AR" t /tmp/staging/lib/libedit.a | grep -q "readline.o"; then
            echo "OK: readline.o is in libedit.a"
          else
            echo "::warning::readline.o is NOT in libedit.a — readline.c likely failed to compile"
          fi
          echo ""
          echo "===== all T symbols matching readline/add_history/read_history/rl_completion ====="
          "$NM" /tmp/staging/lib/libedit.a 2>/dev/null | grep -iE " T (readline|add_history|read_history|rl_completion)" || true
          echo ""
          echo "===== all symbols (any type) matching readline ====="
          "$NM" /tmp/staging/lib/libedit.a 2>/dev/null | grep -i "readline" || true

      - name: Build static libxml2
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o libxml2.tar.xz \
            "https://download.gnome.org/sources/libxml2/2.14/libxml2-2.14.6.tar.xz"
          tar xf libxml2.tar.xz
          cd libxml2-2.14.6
          NDK_TOOLCHAIN_FILE="/opt/android-ndk/build/cmake/android.toolchain.cmake"
          test -f "$NDK_TOOLCHAIN_FILE"
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_TOOLCHAIN_FILE" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM="android-${ANDROID_API}" \
            -DCMAKE_INSTALL_PREFIX=/tmp/staging \
            -DCMAKE_PREFIX_PATH=/tmp/staging \
            -DBUILD_SHARED_LIBS=OFF \
            -DLIBXML2_WITH_ICONV=OFF \
            -DLIBXML2_WITH_LZMA=OFF \
            -DLIBXML2_WITH_PYTHON=OFF \
            -DLIBXML2_WITH_ZLIB=ON \
            -DLIBXML2_WITH_TESTS=OFF \
            -DLIBXML2_WITH_PROGRAMS=OFF
          cmake --build build -j"$(nproc)"
          cmake --install build
          ls -la /tmp/staging/lib/libxml2.a

      - name: Build static openssl
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o openssl.tar.gz \
            "https://github.com/openssl/openssl/releases/download/openssl-3.0.21/openssl-3.0.21.tar.gz"
          tar xf openssl.tar.gz
          cd openssl-3.0.21
          export ANDROID_NDK_ROOT=/opt/android-ndk
          export PATH="$NDK_TOOLCHAIN/bin:$PATH"
          ./Configure android-arm64 \
            -D__ANDROID_API__=${ANDROID_API} \
            no-shared \
            no-tests \
            no-engine \
            --prefix=/tmp/staging \
            --openssldir=/tmp/staging/ssl
          make -j"$(nproc)"
          make install_sw
          ls -la /tmp/staging/lib/libssl.a /tmp/staging/lib/libcrypto.a

      - name: Build host ICU (needed as build tool for cross-compile)
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o icu-src.tgz \
            "https://github.com/unicode-org/icu/releases/download/release-78.3/icu4c-78.3-sources.tgz"
          mkdir -p icu-host
          tar xf icu-src.tgz -C icu-host
          cd icu-host/icu/source
          env -u CC -u CXX -u AR -u RANLIB -u STRIP \
            CC=gcc CXX=g++ AR=ar RANLIB=ranlib \
            ./configure --prefix=/tmp/icu-host-install --disable-tests --disable-samples
          env -u CC -u CXX -u AR -u RANLIB -u STRIP \
            make -j"$(nproc)"
          env -u CC -u CXX -u AR -u RANLIB -u STRIP \
            make install
          ls -la /tmp/icu-host-install/bin | head -20

      - name: Build static ICU for aarch64-android (cross-compile using host tools)
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          mkdir -p icu-target
          tar xf icu-src.tgz -C icu-target
          cd icu-target/icu/source
          CC="$CC" CXX="$CXX" AR="$AR" RANLIB="$RANLIB" \
            CXXFLAGS="-std=c++17" \
            ./configure \
              --host=aarch64-linux-android \
              --with-cross-build=/tmp/icu-host/icu/source \
              --prefix=/tmp/staging \
              --enable-static \
              --disable-shared \
              --disable-tests \
              --disable-samples \
              --disable-extras \
              --disable-tools \
              --with-data-packaging=static
          make -j"$(nproc)"
          make install
          ls -la /tmp/staging/lib/libicuuc.a /tmp/staging/lib/libicui18n.a /tmp/staging/lib/libicudata.a

      # ------------------------------------------------------------------
      # Step 4: Publish deps to Release (only when we just built them).
      # ------------------------------------------------------------------
      - name: Package and publish staging to Release
        if: steps.check.outputs.exists != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          cd /tmp
          tar czf staging-stage1.tar.gz -C /tmp/staging .
          ls -la staging-stage1.tar.gz
          if gh release view "$DEPS_RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$DEPS_RELEASE_TAG" /tmp/staging-stage1.tar.gz \
              --repo "${{ github.repository }}" --clobber
          else
            gh release create "$DEPS_RELEASE_TAG" /tmp/staging-stage1.tar.gz \
              --repo "${{ github.repository }}" \
              --title "Static deps baseline v2 (zlib/uuid/libedit/libxml2/openssl/icu)" \
              --notes "Auto-published by build-pg-static.yml. Contains staging-stage1.tar.gz with statically-built libs for aarch64-android (API ${{ env.ANDROID_API }}). Uses libedit (not readline) for line editing."
          fi

      - name: Verify Release asset published (poll for visibility)
        if: steps.check.outputs.exists != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            if gh release view "$DEPS_RELEASE_TAG" --repo "${{ github.repository }}" \
                 --json assets --jq '.assets[].name' | grep -q "staging-stage1.tar.gz"; then
              echo "Asset visible in Release."
              exit 0
            fi
            echo "Asset not yet visible (attempt $i), waiting 10s..."
            sleep 10
          done
          echo "::error::staging-stage1.tar.gz not visible in Release after 60s"
          exit 1

      # ------------------------------------------------------------------
      # Step 5: Verify staging dir has all required static libs AND the
      #         termcap/ncurses/curses headers that libedit needed at
      #         build time. Fail fast if anything's missing.
      # ------------------------------------------------------------------
      - name: Verify staging contents
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Staging lib dir"
          ls -la /tmp/staging/lib/ | head -40
          echo "::endgroup::"
          echo "::group::Staging include dir (termcap-related)"
          ls -la /tmp/staging/include/termcap.h \
                 /tmp/staging/include/ncurses.h \
                 /tmp/staging/include/curses.h 2>/dev/null || true
          echo "::endgroup::"
          missing=0
          for lib in libz.a libuuid.a libedit.a libxml2.a \
                     libssl.a libcrypto.a libicuuc.a libicui18n.a libicudata.a \
                     libncurses.a libtermcap.a libtinfo.a libcurses.a; do
            if [ ! -f "/tmp/staging/lib/$lib" ]; then
              echo "::error::Missing required static lib: $lib"
              missing=1
            fi
          done
          for hdr in termcap.h ncurses.h curses.h; do
            if [ ! -f "/tmp/staging/include/$hdr" ]; then
              echo "::error::Missing required header: $hdr"
              missing=1
            fi
          done
          if [ "$missing" != "0" ]; then
            echo "::error::One or more required static libs or headers are missing — aborting before postgres build."
            exit 1
          fi
          echo "All required static libs and termcap headers present."

      # ------------------------------------------------------------------
      # Step 6: Upload staging as a workflow artifact (for debugging).
      # ------------------------------------------------------------------
      - name: Upload staging as workflow artifact
        if: always() && steps.check.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: staging-stage1
          path: /tmp/staging
          if-no-files-found: warn
          retention-days: 14

      # ------------------------------------------------------------------
      # Step 7: Build host zic (timezone compiler).
      # ------------------------------------------------------------------
      - name: Download postgresql source
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o postgresql.tar.bz2 \
            "https://ftp.postgresql.org/pub/source/v${PG_VERSION}/postgresql-${PG_VERSION}.tar.bz2"
          tar xf postgresql.tar.bz2
          ls -d /tmp/postgresql-${PG_VERSION}

      - name: Build host zic (timezone compiler)
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/pg-host-build
          cd /tmp/pg-host-build
          env -u CC -u CXX -u AR -u RANLIB -u STRIP \
            CC=gcc CXX=g++ \
            /tmp/postgresql-${PG_VERSION}/configure --without-readline --without-zlib --without-icu
          env -u CC -u CXX -u AR -u RANLIB -u STRIP \
            make -j"$(nproc)" -C src/timezone zic
          ls -la src/timezone/zic
          file src/timezone/zic

      # ------------------------------------------------------------------
      # NEW: Diagnostic - standalone libedit link test BEFORE postgres
      #      configure. This runs the same link that AC_SEARCH_LIBS will
      #      do, but with verbose output so we can see EXACTLY which
      #      symbol is unresolved. If this fails, postgres configure
      #      will definitely fail too.
      # ------------------------------------------------------------------
      - name: Diagnostic - standalone libedit link test
        shell: bash
        run: |
          set -euxo pipefail
          STAGING=/tmp/staging
          NM="$NDK_TOOLCHAIN/bin/llvm-nm"

          # Minimal conftest — exactly what AC_SEARCH_LIBS([readline],[edit]) does
          cat > /tmp/rl_conftest.c <<'EOF'
          char readline(void);
          int main(void) { return (int)(long)readline(); }
          EOF

          echo ""
          echo "============================================"
          echo "Step 0: Undefined symbols referenced by libedit.a"
          echo "============================================"
          "$NM" "$STAGING/lib/libedit.a" 2>/dev/null | grep ' U ' | sort -u

          echo ""
          echo "============================================"
          echo "Test 1: -ledit -lncurses"
          echo "============================================"
          $CC -I"$STAGING/include" -L"$STAGING/lib" \
            /tmp/rl_conftest.c -o /tmp/rl_test1 \
            -ledit -lncurses 2>&1 || echo ">>> Test 1 FAILED"

          echo ""
          echo "============================================"
          echo "Test 2: -ledit -lncurses -lc++_static"
          echo "============================================"
          $CC -I"$STAGING/include" -L"$STAGING/lib" \
            /tmp/rl_conftest.c -o /tmp/rl_test2 \
            -ledit -lncurses -lc++_static 2>&1 || echo ">>> Test 2 FAILED"

          echo ""
          echo "============================================"
          echo "Test 3: -ledit -lncurses -lc++_static -latomic"
          echo "============================================"
          $CC -I"$STAGING/include" -L"$STAGING/lib" \
            /tmp/rl_conftest.c -o /tmp/rl_test3 \
            -ledit -lncurses -lc++_static -latomic 2>&1 || echo ">>> Test 3 FAILED"

          echo ""
          echo "============================================"
          echo "Test 4: -ledit -lncurses -lc++_static -latomic"
          echo "============================================"
          $CC -I"$STAGING/include" -L"$STAGING/lib" \
            /tmp/rl_conftest.c -o /tmp/rl_test4 \
            -ledit -lncurses -lc++_static -latomic 2>&1 || echo ">>> Test 4 FAILED"

          echo ""
          echo "============================================"
          echo "Test 5: full STATIC_LIBS (same as postgres configure will use)"
          echo "============================================"
          STATIC_LIBS="-Wl,-Bstatic -lssl -lcrypto -lxml2 -licui18n -licuuc -licudata -ledit -lncurses -luuid -lz -Wl,-Bdynamic -lc++_static -latomic"
          $CC -I"$STAGING/include" -I"$STAGING/include/libxml2" -L"$STAGING/lib" \
            /tmp/rl_conftest.c -o /tmp/rl_test5 \
            $STATIC_LIBS 2>&1 || echo ">>> Test 5 FAILED"

          echo ""
          echo "============================================"
          echo "Test 6: explicit .a paths (bypass -Bstatic/-Bdynamic entirely)"
          echo "============================================"
          $CC -I"$STAGING/include" \
            /tmp/rl_conftest.c -o /tmp/rl_test6 \
            "$STAGING/lib/libedit.a" \
            "$STAGING/lib/libncurses.a" \
            -lc++_static -latomic 2>&1 || echo ">>> Test 6 FAILED"

          echo ""
          echo "============================================"
          echo "Summary of which tests succeeded:"
          echo "============================================"
          for i in 1 2 3 4 5 6; do
            if [ -f "/tmp/rl_test$i" ]; then
              echo "  Test $i: OK ($(file /tmp/rl_test$i | cut -d: -f2))"
            else
              echo "  Test $i: FAILED"
            fi
          done

          # Don't fail the workflow even if all tests fail — we want to
          # see the diagnostic output, then let the postgres configure
          # step produce its own error + config.log dump.
          exit 0

      # ------------------------------------------------------------------
      # Step 8: Cross-compile postgres itself, partial-static-link style.
      #
      # CHANGED: --with-readline replaced with --with-libedit.
      #          STATIC_LIBS simplified: -lreadline -lhistory -ltermcap
      #          replaced by single -ledit.
      # ------------------------------------------------------------------
      - name: Configure and build postgres (cross-compile, partial static link)
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/postgresql-${PG_VERSION}

          STAGING=/tmp/staging

          # Partial static link: pull these libs in statically, everything else
          # (libc, libm, libdl, liblog, etc. from bionic) stays dynamic.
          #
          # IMPORTANT: this must go into LIBS, not LDFLAGS. See comment in
          # previous versions on autoconf's AC_CHECK_LIB probe ordering.
          #
          # NOTE: -ledit replaces the old -lreadline -lhistory -ltermcap combo.
          #       libedit is self-contained for the line-editing API, but still
          #       references tgetent/tputs/etc. from a termcap provider. We
          #       install a tiny stub as libncurses.a (and 3 other names) and
          #       link it here right after -ledit.
          #
          # NOTE: -lc++_static -latomic come after -Wl,-Bdynamic because
          #       they live in the NDK sysroot, not in /tmp/staging/lib.
          #       They resolve C++ runtime symbols (__cxa_throw, operator
          #       new, __atomic_fetch_add_8, etc.) that libicui18n.a /
          #       libicuuc.a reference.
          #
          # NOTE: -landroid_support is NOT included — it was removed from
          #       NDK r17+ and doesn't exist in NDK r27c. On aarch64 with
          #       API 24+, bionic provides everything needed natively.
          STATIC_LIBS="-Wl,-Bstatic -lssl -lcrypto -lxml2 -licui18n -licuuc -licudata -ledit -lncurses -luuid -lz -Wl,-Bdynamic -lc++_static -latomic"

          CC="$CC" \
          CPPFLAGS="-I${STAGING}/include -I${STAGING}/include/libxml2" \
          LDFLAGS="-L${STAGING}/lib" \
          LIBS="${STATIC_LIBS}" \
          ZIC=/tmp/pg-host-build/src/timezone/zic \
          ./configure \
            --host=aarch64-linux-android \
            --prefix=/tmp/pg-install \
            --with-openssl \
            --with-libxml \
            --with-icu \
            --with-readline \
            --with-libedit-preferred \
            --with-uuid=e2fs \
            --without-perl \
            --without-python \
            --without-tcl \
            --without-pam \
            --without-ldap \
            --without-selinux \
            --without-systemd

          make -j"$(nproc)" world-bin
          make install-world-bin DESTDIR=/tmp/pg-install-root

      # ------------------------------------------------------------------
      # If configure fails, dump the tail of config.log so the actual
      # link error is visible in the workflow run output instead of just
      # "libedit library not found" / "readline library not found".
      # ------------------------------------------------------------------
      - name: Dump config.log on configure failure
        if: failure()
        shell: bash
        run: |
          echo "============================================================"
          echo "===== config.log: last 600 lines ====="
          echo "============================================================"
          tail -600 /tmp/postgresql-${PG_VERSION}/config.log 2>/dev/null || echo "(config.log not found)"

          echo ""
          echo "============================================================"
          echo "===== config.log: readline/edit/libedit conftest section ====="
          echo "============================================================"
          grep -n -iE "readline|libedit|editline" /tmp/postgresql-${PG_VERSION}/config.log 2>/dev/null | tail -30

          echo ""
          echo "============================================================"
          echo "===== config.log: all 'undefined reference' errors ====="
          echo "============================================================"
          grep -i "undefined reference\|cannot find\|error:" /tmp/postgresql-${PG_VERSION}/config.log 2>/dev/null | sort -u | tail -80

          echo ""
          echo "============================================================"
          echo "===== config.log: failed link commands (last 10) ====="
          echo "============================================================"
          grep -E "aarch64.*-o conftest|aarch64.*conftest.*\.c" /tmp/postgresql-${PG_VERSION}/config.log 2>/dev/null | tail -10

      # ------------------------------------------------------------------
      # Step 9: Inspect + package + upload the final postgres binaries.
      # ------------------------------------------------------------------
      - name: Inspect resulting binaries
        shell: bash
        run: |
          set -euxo pipefail
          find /tmp/pg-install-root -maxdepth 4 -type f | sort
          file /tmp/pg-install-root/tmp/pg-install/bin/postgres || true
          file /tmp/pg-install-root/tmp/pg-install/bin/psql || true

      - name: Package result
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/pg-install-root/tmp/pg-install
          tar czf /tmp/postgresql-${PG_VERSION}-android-aarch64.tar.gz .
          ls -la /tmp/postgresql-${PG_VERSION}-android-aarch64.tar.gz

      - name: Upload postgres build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-android-aarch64
          path: /tmp/postgresql-${{ env.PG_VERSION }}-android-aarch64.tar.gz
          if-no-files-found: warn
          retention-days: 30
