name: "Build static postgres deps - merged pipeline"

on:
  workflow_dispatch:
    inputs:
      force_rebuild_deps:
        description: "Force rebuilding the 6 static deps even if a deps release already exists"
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-pg-static.yml'

permissions:
  contents: write

env:
  ANDROID_API: 24
  NDK_VERSION: r27c
  DEPS_RELEASE_TAG: deps-baseline-v1
  PG_VERSION: "18.2"

jobs:
  build-all:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Step 1: Decide whether we need to rebuild the 6 static deps.
      # ------------------------------------------------------------------
      - name: Check whether deps release already has the staging asset
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          FORCE="${{ inputs.force_rebuild_deps || 'false' }}"
          if [ "$FORCE" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "$DEPS_RELEASE_TAG" --repo "${{ github.repository }}" \
               --json assets --jq '.assets[].name' 2>/dev/null | grep -q "staging-stage1.tar.gz"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ------------------------------------------------------------------
      # Step 2: NDK setup (shared by deps build and postgres build).
      # ------------------------------------------------------------------
      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /opt/android-ndk
          key: android-ndk-${{ env.NDK_VERSION }}-linux

      - name: Download and unpack NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          curl -fsSL -o /tmp/ndk.zip \
            "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          mkdir -p /opt/android-ndk
          unzip -q /tmp/ndk.zip -d /tmp/ndk-extract
          mv /tmp/ndk-extract/android-ndk-${NDK_VERSION}/* /opt/android-ndk/
          rm -rf /tmp/ndk.zip /tmp/ndk-extract

      - name: Set toolchain environment
        shell: bash
        run: |
          set -euxo pipefail
          TOOLCHAIN="/opt/android-ndk/toolchains/llvm/prebuilt/linux-x86_64"
          echo "NDK_TOOLCHAIN=$TOOLCHAIN" >> "$GITHUB_ENV"
          echo "CC=$TOOLCHAIN/bin/aarch64-linux-android${ANDROID_API}-clang" >> "$GITHUB_ENV"
          echo "CXX=$TOOLCHAIN/bin/aarch64-linux-android${ANDROID_API}-clang++" >> "$GITHUB_ENV"
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> "$GITHUB_ENV"
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> "$GITHUB_ENV"
          echo "$TOOLCHAIN/bin" >> "$GITHUB_PATH"

      - name: Probe toolchain
        shell: bash
        run: |
          set -x
          ls -la "$NDK_TOOLCHAIN/bin" | grep -i aarch64
          echo "CC=$CC"
          "$CC" --version
          find "$NDK_TOOLCHAIN" -maxdepth 3 -iname "sysroot" -type d

      - name: Ensure cmake is available
        shell: bash
        run: |
          set -euxo pipefail
          if ! cmake --version >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y cmake
          fi
          cmake --version

      - name: Smoke test cross-compile
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/smoke
          printf '%s\n' \
            '#include <stdio.h>' \
            'int main(void) { printf("hello from android build\n"); return 0; }' \
            > /tmp/smoke/hello.c
          "$CC" /tmp/smoke/hello.c -o /tmp/smoke/hello
          file /tmp/smoke/hello

      # ------------------------------------------------------------------
      # Step 3a: If deps already exist in Release, download them with retries.
      #          This branch is the only path when steps.check.outputs.exists == 'true'.
      # ------------------------------------------------------------------
      - name: Download staging deps from Release (with retries + integrity check)
        if: steps.check.outputs.exists == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/staging
          for attempt in 1 2 3 4 5 6 7 8; do
            echo "::group::Release download attempt $attempt"
            rm -f /tmp/staging-stage1.tar.gz
            if gh release download "$DEPS_RELEASE_TAG" \
                 --repo "${{ github.repository }}" \
                 --pattern "staging-stage1.tar.gz" \
                 --dir /tmp --clobber 2>/dev/null; then
              if [ -f /tmp/staging-stage1.tar.gz ] \
                 && gzip -t /tmp/staging-stage1.tar.gz 2>/dev/null; then
                echo "Tarball passed gzip integrity check."
                tar xzf /tmp/staging-stage1.tar.gz -C /tmp/staging
                echo "::endgroup::"
                exit 0
              else
                echo "Downloaded asset failed gzip integrity check, retrying..."
              fi
            else
              echo "gh release download failed on attempt $attempt"
            fi
            echo "::endgroup::"
            sleep $((attempt * 5))
          done
          echo "::error::Failed to download staging-stage1.tar.gz after 8 attempts"
          exit 1

      # ------------------------------------------------------------------
      # Step 3b: Build all 6 static deps from source (only when Release
      #          asset is missing or force_rebuild_deps is true).
      # ------------------------------------------------------------------
      - name: Build static zlib
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -A "Mozilla/5.0 (X11; Linux x86_64) curl-fallback" \
            -o zlib.tar.gz \
            "https://github.com/madler/zlib/releases/download/v1.3.2/zlib-1.3.2.tar.gz"
          tar xf zlib.tar.gz
          cd zlib-1.3.2
          CC="$CC" AR="$AR" RANLIB="$RANLIB" \
            ./configure --prefix=/tmp/staging --static
          make -j"$(nproc)"
          make install
          ls -la /tmp/staging/lib/libz.a

      - name: Build static libuuid (e2fsprogs)
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o e2fsprogs.tar.gz \
            "https://sourceforge.net/projects/e2fsprogs/files/e2fsprogs/v1.47.4/e2fsprogs-1.47.4.tar.gz/download"
          tar xf e2fsprogs.tar.gz
          cd e2fsprogs-1.47.4
          CC="$CC" AR="$AR" RANLIB="$RANLIB" \
            ./configure \
              --host=aarch64-linux-android \
              --prefix=/tmp/staging \
              --enable-libuuid \
              --disable-shared \
              --enable-static \
              --disable-defrag \
              --disable-e2initrd-helper \
              --disable-fsck \
              --disable-uuidd
          make -C lib/uuid -j"$(nproc)"
          make -C lib/uuid install
          ls -la /tmp/staging/lib/libuuid.a

      - name: Build static readline
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o readline.tar.gz https://ftp.gnu.org/gnu/readline/readline-8.3.tar.gz
          tar xf readline.tar.gz
          cd readline-8.3
          CC="$CC" AR="$AR" RANLIB="$RANLIB" \
            bash_cv_termcap_lib=none \
            bash_cv_signed_chars=yes \
            bash_cv_must_reinstall_sighandlers=no \
            bash_cv_wcwidth_broken=no \
            ./configure \
              --host=aarch64-linux-android \
              --prefix=/tmp/staging \
              --disable-shared \
              --enable-static \
              --with-curses=no \
              --without-purify
          make -j"$(nproc)" SHLIB_LIBS=""
          make install SHLIB_LIBS=""
          ls -la /tmp/staging/lib/libreadline.a /tmp/staging/lib/libhistory.a

      - name: Build static libxml2
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o libxml2.tar.xz \
            "https://download.gnome.org/sources/libxml2/2.14/libxml2-2.14.6.tar.xz"
          tar xf libxml2.tar.xz
          cd libxml2-2.14.6
          NDK_TOOLCHAIN_FILE="/opt/android-ndk/build/cmake/android.toolchain.cmake"
          test -f "$NDK_TOOLCHAIN_FILE"
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_TOOLCHAIN_FILE" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM="android-${ANDROID_API}" \
            -DCMAKE_INSTALL_PREFIX=/tmp/staging \
            -DCMAKE_PREFIX_PATH=/tmp/staging \
            -DBUILD_SHARED_LIBS=OFF \
            -DLIBXML2_WITH_ICONV=OFF \
            -DLIBXML2_WITH_LZMA=OFF \
            -DLIBXML2_WITH_PYTHON=OFF \
            -DLIBXML2_WITH_ZLIB=ON \
            -DLIBXML2_WITH_TESTS=OFF \
            -DLIBXML2_WITH_PROGRAMS=OFF
          cmake --build build -j"$(nproc)"
          cmake --install build
          ls -la /tmp/staging/lib/libxml2.a

      - name: Build static openssl
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o openssl.tar.gz \
            "https://github.com/openssl/openssl/releases/download/openssl-3.0.21/openssl-3.0.21.tar.gz"
          tar xf openssl.tar.gz
          cd openssl-3.0.21
          export ANDROID_NDK_ROOT=/opt/android-ndk
          export PATH="$NDK_TOOLCHAIN/bin:$PATH"
          ./Configure android-arm64 \
            -D__ANDROID_API__=${ANDROID_API} \
            no-shared \
            no-tests \
            no-engine \
            --prefix=/tmp/staging \
            --openssldir=/tmp/staging/ssl
          make -j"$(nproc)"
          make install_sw
          ls -la /tmp/staging/lib/libssl.a /tmp/staging/lib/libcrypto.a

      - name: Build host ICU (needed as build tool for cross-compile)
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o icu-src.tgz \
            "https://github.com/unicode-org/icu/releases/download/release-78.3/icu4c-78.3-sources.tgz"
          mkdir -p icu-host
          tar xf icu-src.tgz -C icu-host
          cd icu-host/icu/source
          # IMPORTANT: unset the Android cross-compiler env vars inherited from
          # GITHUB_ENV. This host build must use the runner's native x86_64
          # gcc/g++, not the aarch64 Android clang, otherwise configure
          # mis-detects the build system as x86_64-pc-linux-android and
          # produces non-runnable host tools.
          env -u CC -u CXX -u AR -u RANLIB -u STRIP \
            CC=gcc CXX=g++ AR=ar RANLIB=ranlib \
            ./configure --prefix=/tmp/icu-host-install --disable-tests --disable-samples
          env -u CC -u CXX -u AR -u RANLIB -u STRIP \
            make -j"$(nproc)"
          env -u CC -u CXX -u AR -u RANLIB -u STRIP \
            make install
          ls -la /tmp/icu-host-install/bin | head -20

      - name: Build static ICU for aarch64-android (cross-compile using host tools)
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          mkdir -p icu-target
          tar xf icu-src.tgz -C icu-target
          cd icu-target/icu/source
          CC="$CC" CXX="$CXX" AR="$AR" RANLIB="$RANLIB" \
            CXXFLAGS="-std=c++17" \
            ./configure \
              --host=aarch64-linux-android \
              --with-cross-build=/tmp/icu-host/icu/source \
              --prefix=/tmp/staging \
              --enable-static \
              --disable-shared \
              --disable-tests \
              --disable-samples \
              --disable-extras \
              --disable-tools \
              --with-data-packaging=static
          make -j"$(nproc)"
          make install
          ls -la /tmp/staging/lib/libicuuc.a /tmp/staging/lib/libicui18n.a /tmp/staging/lib/libicudata.a

      # ------------------------------------------------------------------
      # Step 4: Publish deps to Release (only when we just built them).
      #         Includes a post-upload visibility poll.
      # ------------------------------------------------------------------
      - name: Package and publish staging to Release
        if: steps.check.outputs.exists != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          cd /tmp
          tar czf staging-stage1.tar.gz -C /tmp/staging .
          ls -la staging-stage1.tar.gz
          if gh release view "$DEPS_RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$DEPS_RELEASE_TAG" /tmp/staging-stage1.tar.gz \
              --repo "${{ github.repository }}" --clobber
          else
            gh release create "$DEPS_RELEASE_TAG" /tmp/staging-stage1.tar.gz \
              --repo "${{ github.repository }}" \
              --title "Static deps baseline (zlib/uuid/readline/libxml2/openssl/icu)" \
              --notes "Auto-published by build-pg-static.yml. Contains staging-stage1.tar.gz with the 6 statically-built libs for aarch64-android (API ${{ env.ANDROID_API }})."
          fi

      - name: Verify Release asset published (poll for visibility)
        if: steps.check.outputs.exists != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # gh release upload is eventually-consistent on the assets list —
          # poll a few times before trusting it.
          for i in 1 2 3 4 5 6; do
            if gh release view "$DEPS_RELEASE_TAG" --repo "${{ github.repository }}" \
                 --json assets --jq '.assets[].name' | grep -q "staging-stage1.tar.gz"; then
              echo "Asset visible in Release."
              exit 0
            fi
            echo "Asset not yet visible (attempt $i), waiting 10s..."
            sleep 10
          done
          echo "::error::staging-stage1.tar.gz not visible in Release after 60s"
          exit 1

      # ------------------------------------------------------------------
      # Step 5: Verify staging dir has all required static libs before
      #         proceeding to postgres build. Fail fast if anything's missing.
      # ------------------------------------------------------------------
      - name: Verify staging contents
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Staging lib dir"
          ls -la /tmp/staging/lib/ | head -40
          echo "::endgroup::"
          missing=0
          for lib in libz.a libuuid.a libreadline.a libhistory.a libxml2.a \
                     libssl.a libcrypto.a libicuuc.a libicui18n.a libicudata.a; do
            if [ ! -f "/tmp/staging/lib/$lib" ]; then
              echo "::error::Missing required static lib: $lib"
              missing=1
            fi
          done
          if [ "$missing" != "0" ]; then
            echo "::error::One or more required static libs are missing — aborting before postgres build."
            exit 1
          fi
          echo "All required static libs present."

      # ------------------------------------------------------------------
      # Step 6: Upload staging as a workflow artifact too (for debugging
      #         and as a secondary fallback). `if: always()` so we get it
      #         even if a later step fails.
      # ------------------------------------------------------------------
      - name: Upload staging as workflow artifact
        if: always() && steps.check.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: staging-stage1
          path: /tmp/staging
          if-no-files-found: warn
          retention-days: 14

      # ------------------------------------------------------------------
      # Step 7: Build host zic (timezone compiler, must run on the build
      #         machine). zic is needed by postgres's configure/make.
      # ------------------------------------------------------------------
      - name: Download postgresql source
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -fsSL -o postgresql.tar.bz2 \
            "https://ftp.postgresql.org/pub/source/v${PG_VERSION}/postgresql-${PG_VERSION}.tar.bz2"
          tar xf postgresql.tar.bz2
          ls -d /tmp/postgresql-${PG_VERSION}

      - name: Build host zic (timezone compiler)
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/pg-host-build
          cd /tmp/pg-host-build
          env -u CC -u CXX -u AR -u RANLIB -u STRIP \
            CC=gcc CXX=g++ \
            /tmp/postgresql-${PG_VERSION}/configure --without-readline --without-zlib --without-icu
          env -u CC -u CXX -u AR -u RANLIB -u STRIP \
            make -j"$(nproc)" -C src/timezone zic
          ls -la src/timezone/zic
          file src/timezone/zic

      # ------------------------------------------------------------------
      # Step 8: Cross-compile postgres itself, partial-static-link style.
      # ------------------------------------------------------------------
      - name: Configure and build postgres (cross-compile, partial static link)
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/postgresql-${PG_VERSION}

          STAGING=/tmp/staging

          # Partial static link: pull these libs in statically, everything else
          # (libc, libm, libdl, liblog, etc. from bionic) stays dynamic.
          #
          # IMPORTANT: this must go into LIBS, not LDFLAGS. configure's
          # AC_CHECK_LIB probes link a tiny conftest.c as roughly:
          #   $CC $CFLAGS $LDFLAGS -o conftest conftest.c -lreadline $LIBS
          # If the -Wl,-Bstatic/-Bdynamic wrapping lives in LDFLAGS, it ends up
          # positioned *before* the -lreadline that autoconf appends on the
          # command line itself, so the static/dynamic switch has already been
          # reset back to dynamic (autoconf's own -lreadline isn't wrapped) by
          # the time the linker reaches it, and the static .a in our staging
          # dir is never found by the search. Putting the whole wrapped list in
          # LIBS instead means it's appended *after* configure's own -lreadline,
          # so our static copy resolves the symbols first.
          STATIC_LIBS="-Wl,-Bstatic -lssl -lcrypto -lxml2 -licui18n -licuuc -licudata -lreadline -lhistory -luuid -lz -Wl,-Bdynamic"

          CC="$CC" \
          CPPFLAGS="-I${STAGING}/include -I${STAGING}/include/libxml2" \
          LDFLAGS="-L${STAGING}/lib" \
          LIBS="${STATIC_LIBS}" \
          ZIC=/tmp/pg-host-build/src/timezone/zic \
          ./configure \
            --host=aarch64-linux-android \
            --prefix=/tmp/pg-install \
            --with-openssl \
            --with-libxml \
            --with-icu \
            --with-readline \
            --with-uuid=e2fs \
            --without-perl \
            --without-python \
            --without-tcl \
            --without-pam \
            --without-ldap \
            --without-selinux \
            --without-systemd

          make -j"$(nproc)" world-bin
          make install-world-bin DESTDIR=/tmp/pg-install-root

      # ------------------------------------------------------------------
      # Step 9: Inspect + package + upload the final postgres binaries.
      # ------------------------------------------------------------------
      - name: Inspect resulting binaries
        shell: bash
        run: |
          set -euxo pipefail
          find /tmp/pg-install-root -maxdepth 4 -type f | sort
          file /tmp/pg-install-root/tmp/pg-install/bin/postgres || true
          file /tmp/pg-install-root/tmp/pg-install/bin/psql || true

      - name: Package result
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp/pg-install-root/tmp/pg-install
          tar czf /tmp/postgresql-${PG_VERSION}-android-aarch64.tar.gz .
          ls -la /tmp/postgresql-${PG_VERSION}-android-aarch64.tar.gz

      - name: Upload postgres build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-android-aarch64
          path: /tmp/postgresql-${{ env.PG_VERSION }}-android-aarch64.tar.gz
          if-no-files-found: warn
          retention-days: 30